<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal UEPAM — Iniciar Sesión | Colegio UEPAM</title>
    <meta name="description" content="Accede al Portal UEPAM para consultar calificaciones y recursos académicos. Exclusivo para estudiantes del Colegio UEPAM.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon/favicon.ico">
    <style>
        .login-background {
            background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('https://placehold.co/1920x1080/1e3a5f/ffffff?text=Colegio+UEPAM');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
    </style>
</head>
<body style="font-family:'Inter',sans-serif;">
    <a href="#login-card" class="skip-link">Saltar al formulario de inicio de sesión</a>

    <div class="login-background">
        <header style="padding:24px;">
            <a href="index.html" style="color:#fff; font-size:1.25rem; font-weight:700; text-decoration:none;">Colegio UEPAM</a>
        </header>

        <main style="flex:1; display:flex; align-items:center; justify-content:center;" id="main-content">
            <div class="login-card" id="login-card">
                <div style="text-align:center;">
                    <h1 style="font-size:1.75rem; font-weight:700; color:#1e293b;">Portal UEPAM</h1>
                    <p style="color:#64748b; margin-top:8px;">Inicia sesión para acceder a tus recursos.</p>
                </div>

                <form id="login-form" style="margin-top:32px;" novalidate>
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required
                               autocomplete="email"
                               aria-required="true"
                               placeholder="tu@correo.com">
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required
                               autocomplete="current-password"
                               aria-required="true"
                               placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width:100%;">
                        Ingresar
                    </button>
                    <p id="error-message" style="color:#ef4444; text-align:center; margin-top:16px; min-height:24px;"></p>
                </form>
            </div>
        </main>

        <footer style="text-align:center; color:#cbd5e1; padding:24px;">
            <div style="margin-bottom:12px;">
                <p style="margin-bottom:8px;">Síguenos en nuestras redes sociales</p>
                <div style="display:flex; justify-content:center; gap:16px;">
                    <a href="#" style="color:#cbd5e1; text-decoration:none;">Facebook</a>
                    <a href="#" style="color:#cbd5e1; text-decoration:none;">Instagram</a>
                    <a href="#" style="color:#cbd5e1; text-decoration:none;">Twitter</a>
                </div>
            </div>
            <p style="font-size:0.813rem; color:#94a3b8;">&copy; 2025 Colegio UEPAM. Todos los derechos reservados.</p>
        </footer>
    </div>

    <script>
        var loginForm = document.getElementById('login-form');
        var errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var liveBackendUrl = 'https://colegio-backend-6oun.onrender.com';

            try {
                var response = await fetch(liveBackendUrl + '/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                var data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Error al iniciar sesión');
                }

                sessionStorage.setItem('authToken', data.token);

                var payload = JSON.parse(atob(data.token.split('.')[1]));

                if (payload.rol === 'estudiante') {
                    window.location.href = 'plataforma-estudiantil.html';
                } else if (payload.rol === 'admin') {
                    window.location.href = 'admin/dashboard.html';
                } else if (payload.rol === 'docente') {
                    window.location.href = 'docente/dashboard.html';
                } else {
                    errorMessage.textContent = 'Rol de usuario no reconocido.';
                }
            } catch (error) {
                errorMessage.textContent = error.message;
            }
        });
    </script>
</body>
</html>
