<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Estudiantil — U.E.P. Aurelio Mosquera</title>
    <meta name="description" content="Acceda al portal estudiantil de la Unidad Educativa Particular Aurelio Mosquera para consultar calificaciones y recursos académicos.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
    <style>
        .login-background {
            background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('https://res.cloudinary.com/drwas2q8h/image/upload/v1783442164/colegio-uepam/eventos/ig0xnyzow6lwmeexh8oz.jpg');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
    </style>
</head>
<body>
    <a href="#login-card" class="skip-link">Saltar al formulario de inicio de sesión</a>

    <div class="login-background">
        <header style="padding:24px;">
            <a href="index.html" style="color:var(--white); font-size:1.25rem; font-weight:800; text-decoration:none; letter-spacing:-0.02em; display:flex; align-items:center; gap:10px;">
                <img src="favicon/logo.jpeg" alt="Logo" style="width:36px; height:36px; border-radius:6px; object-fit:cover;">
                U.E.P. Aurelio Mosquera
            </a>
        </header>

        <main style="flex:1; display:flex; align-items:center; justify-content:center;" id="main-content">
            <div class="login-card" id="login-card">
                <div style="text-align:center;">
                    <h1 style="font-size:1.75rem; font-weight:700; color:var(--gray-900);">Portal Estudiantil</h1>
                    <p style="color:var(--gray-500); margin-top:8px;">Inicie sesión para acceder a sus recursos académicos.</p>
                </div>

                <form id="login-form" style="margin-top:32px;" novalidate>
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required
                           autocomplete="email"
                           aria-required="true"
                           placeholder="usuario@ejemplo.com">
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required
                               autocomplete="current-password"
                               aria-required="true"
                               placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width:100%;">
                        Ingresar
                    </button>
                    <p id="error-message" style="color:var(--red-500); text-align:center; margin-top:16px; min-height:24px;"></p>
                </form>
            </div>
        </main>

        <footer style="text-align:center; color:var(--gray-300); padding:24px;">
            <div style="margin-bottom:12px;">
                <p style="margin-bottom:8px;">Síguenos en nuestras redes sociales</p>
                <div style="display:flex; justify-content:center; gap:16px;">
                    <a href="#" style="color:var(--gray-300); text-decoration:none;">Facebook</a>
                    <a href="#" style="color:var(--gray-300); text-decoration:none;">Instagram</a>
                    <a href="#" style="color:var(--gray-300); text-decoration:none;">Twitter</a>
                </div>
            </div>
            <p style="font-size:0.813rem; color:var(--gray-400);">&copy; 2025 Unidad Educativa Particular Aurelio Mosquera. Todos los derechos reservados.</p>
        </footer>
    </div>

    <script>
        var loginForm = document.getElementById('login-form');
        var errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var liveBackendUrl = '';

            try {
                var response = await fetch(liveBackendUrl + '/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                var data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Error al iniciar sesión');
                }

                sessionStorage.setItem('authToken', data.token);

                var payload = JSON.parse(atob(data.token.split('.')[1]));

                if (payload.rol === 'estudiante') {
                    window.location.href = 'plataforma-estudiantil.html';
                } else if (payload.rol === 'admin') {
                    window.location.href = 'admin/dashboard.html';
                } else if (payload.rol === 'docente') {
                    window.location.href = 'docente/dashboard.html';
                } else {
                    errorMessage.textContent = 'Rol de usuario no reconocido.';
                }
            } catch (error) {
                errorMessage.textContent = error.message;
            }
        });
    </script>
</body>
</html>
